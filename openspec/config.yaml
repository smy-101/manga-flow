schema: spec-driven

context: |
  技术栈: TypeScript, React 19, Vite 7, Bun, Tauri 2 (Rust)
  包管理器: Bun
  前端: React 19 + TypeScript + Vite 7 + Zustand
  后端: Rust (Tauri 2)
  数据库: SQLite (@tauri-apps/plugin-sql)
  测试: Vitest + React Testing Library（前端）、Cargo 内置测试框架（Rust）
  前端测试策略: 只写 store 单元测试、repo 单元测试、可复用组件测试。不写页面级测试（Library/Reader/Settings/SetupGuide），因为大量 mock Tauri API 后测试的是 mock 而非真实行为
  桌面应用: Tauri v2
  项目名: manga-flow
  语言要求: 所有文档和注释必须使用中文
  状态管理: Zustand（轻量状态容器，业务逻辑在页面组件和 repo 层）

rules:
  proposal:
    - 所有提案文档必须使用中文撰写
    - 提案需包含"非目标"章节
    - 提案需说明测试策略
  design:
    - 所有设计文档必须使用中文撰写
    - 设计需考虑 Tauri 前后端交互边界（invoke 调用、事件监听、asset 协议）
    - 需明确前端状态管理和 Rust 后端职责划分
    - 文件存储在磁盘（library_dir/books/{uuid}/pages/），元数据在 SQLite
    - 封面缩略图存储为 WebP 格式（300px 宽），位于应用数据目录
  specs:
    - 所有规格文档必须使用中文撰写
    - 规格需包含输入输出定义和边界条件
  tasks:
    - 所有任务文档必须使用中文撰写
    - 采用 TDD 红绿测试模式开发（先写失败测试，再写实现代码使测试通过）
    - 每个任务必须先编写测试（红灯阶段），再编写实现（绿灯阶段），最后重构
    - 任务粒度控制在最大 2 小时内
    - 前端测试使用 Vitest + React Testing Library，测试文件放在 src/test/
    - 前端只写 store 单元测试、repo 单元测试、可复用组件测试，不写页面级测试
    - Rust 后端测试使用 Cargo 内置测试框架，测试写在同文件的 #[cfg(test)] 模块中
    - 每个任务需明确标注：红灯（写测试）→ 绿灯（写实现）→ 重构 三个步骤

workflow:
  description: |
    OpenSpec 管理规格和任务（做什么），Superpowers 管理实施过程（怎么做）。
    两者按以下流程衔接，Superpowers 技能在对应阶段自动触发。
  stages:
    - name: 探索与构思
      openspec: opsx:explore
      superpowers: brainstorming
      说明: 先用 brainstorming 充分发散，再用 explore 做规格化收敛

    - name: 规格与计划
      openspec: opsx:propose / opsx:ff
      superpowers: writing-plans
      说明: OpenSpec 产出变更产物（proposal、design、spec、tasks），计划从产物中自然得出

    - name: 实施
      openspec: opsx:apply
      superpowers: [executing-plans, test-driven-development, subagent-driven-development]
      说明: 用 apply 管理任务执行顺序，Superpowers 的 TDD 和并行 agents 负责具体实施

    - name: 验证
      openspec: opsx:verify
      superpowers: verification-before-completion
      说明: 两者互补——verify 检查产物一致性，verification-before-completion 检查代码质量

    - name: 收尾
      openspec: opsx:archive
      superpowers: finishing-a-development-branch
      说明: 先 verify/archive 归档变更，再用 finishing-a-development-branch 处理分支集成
